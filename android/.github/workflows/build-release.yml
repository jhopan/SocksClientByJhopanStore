name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APKs
        run: ./gradlew :app:assembleRelease

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk/release
          VERSION=$(grep 'versionName' ../../../build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mv app-arm64-v8a-release.apk "SocksClient-v${VERSION}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "SocksClient-v${VERSION}-armeabi-v7a.apk"
          mv app-universal-release.apk "SocksClient-v${VERSION}-universal.apk"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          ls -lh *.apk

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SocksClient-APKs
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Socks Client v${{ env.VERSION }}"
          body: |
            ## Socks Client v${{ env.VERSION }}
            
            ### Download APK
            | File | Arsitektur | Keterangan |
            |------|-----------|------------|
            | `SocksClient-v${{ env.VERSION }}-arm64-v8a.apk` | 64-bit | HP modern (95% HP) |
            | `SocksClient-v${{ env.VERSION }}-armeabi-v7a.apk` | 32-bit | HP lama |
            | `SocksClient-v${{ env.VERSION }}-universal.apk` | Semua | Universal |
          draft: false
          prerelease: false
